name: "🐞 Bug Report"
description: "버그나 문제를 보고합니다."
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: 문제 요약
      placeholder: 어떤 문제가 발생했는지 적어주세요.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 재현 방법
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:

  - type: textarea
    id: expected
    attributes:
      label: 기대 동작
      placeholder: 정상적으로 동작했을 때 화면에 나타나는 동작을 설명해주세요.

  - type: textarea
    id: screenshot
    attributes:
      label: 스크린샷
      placeholder: 선택 사항
